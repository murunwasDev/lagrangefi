apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
spec:
  rules:
    - host: lagrangefi.xyz
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
          - path: /me
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
