apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

bases:
  - ../../base

patches:
  - path: web-replicas.yaml
  - path: ingress-host.yaml

# Image tags for prod must be pinned manually to a specific SHA before deploying.
# Update the newTag values below, then: kubectl apply -k k8s/overlays/prod
images:
  - name: lagrangefi/api
    newName: ghcr.io/aibob404/lagrangefi-api
    newTag: sha-placeholder
  - name: lagrangefi/chain
    newName: ghcr.io/aibob404/lagrangefi-chain
    newTag: sha-placeholder
  - name: lagrangefi/web
    newName: ghcr.io/aibob404/lagrangefi-web
    newTag: sha-placeholder

# ─── Secrets ──────────────────────────────────────────────────────────────────
#
# postgres-secret  (used by postgres StatefulSet)
#   kubectl create secret generic postgres-secret -n prod \
#     --from-literal=user=lagrangefi \
#     --from-literal=password=<DB_PASSWORD>
#
# api-secret  (used by the api Deployment)
#   kubectl create secret generic api-secret -n prod \
#     --from-literal=DATABASE_PASSWORD=<DB_PASSWORD> \
#     --from-literal=TELEGRAM_BOT_TOKEN=<TOKEN> \
#     --from-literal=JWT_SECRET=<random 64-char string> \
#     --from-literal=WALLET_ENCRYPTION_KEY=<base64 of 32 random bytes>
#
#   Generate WALLET_ENCRYPTION_KEY:  openssl rand -base64 32
#   Generate JWT_SECRET:             openssl rand -hex 32
#
# chain-secret is NO LONGER NEEDED.
#   Wallet private keys are now stored per-user in the database (encrypted),
#   and forwarded by the api service on each rebalance request.
#   The chain service uses no secrets.
#
# ─── ConfigMaps ───────────────────────────────────────────────────────────────
#
# api-config
#   kubectl create configmap api-config -n prod \
#     --from-literal=CHAIN_SERVICE_URL=http://chain:3001 \
#     --from-literal=DATABASE_URL=postgresql://postgres:5432/lagrangefi \
#     --from-literal=DATABASE_USER=lagrangefi \
#     --from-literal=TELEGRAM_CHAT_ID=<chat_id>
#
# chain-config
#   kubectl create configmap chain-config -n prod \
#     --from-literal=ARBITRUM_RPC_URL=https://arb-mainnet.g.alchemy.com/v2/<key> \
#     --from-literal=PORT=3001
