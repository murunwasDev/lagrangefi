apiVersion: apps/v1
kind: Deployment
metadata:
  name: chain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chain
  template:
    metadata:
      labels:
        app: chain
    spec:
      containers:
        - name: chain
          image: lagrangefi/chain:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: chain-config
          # No secrets needed: wallet keys are provided per-request by the api service.
          # WALLET_PRIVATE_KEY env var is no longer used.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
