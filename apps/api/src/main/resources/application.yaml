host: "0.0.0.0"
port: 3000
chainServiceUrl: ${CHAIN_SERVICE_URL}

database:
  url: ${DATABASE_URL}
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}
  poolSize: 10

telegram:
  botToken: ${TELEGRAM_BOT_TOKEN}
  chatId: ${TELEGRAM_CHAT_ID}

rebalancer:
  positionTokenId: ${UNISWAP_POSITION_TOKEN_ID}
  rangePercent: ${REBALANCER_RANGE_PERCENT:-0.05}
  pollIntervalSeconds: ${REBALANCER_POLL_INTERVAL:-60}
  slippageTolerance: ${REBALANCER_SLIPPAGE_TOLERANCE:-0.005}
