apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

bases:
  - ../../base

patches:
  - path: web-replicas.yaml
  - path: ingress-host.yaml

# Image tags for prod must be pinned manually to a specific SHA before deploying.
# Update the newTag values below, then: kubectl apply -k k8s/overlays/prod
images:
  - name: lagrangefi/api
    newName: ghcr.io/aibob404/lagrangefi-api
    newTag: sha-placeholder
  - name: lagrangefi/chain
    newName: ghcr.io/aibob404/lagrangefi-chain
    newTag: sha-placeholder
  - name: lagrangefi/web
    newName: ghcr.io/aibob404/lagrangefi-web
    newTag: sha-placeholder

# Secrets must be created manually in the cluster:
#   kubectl create secret generic postgres-secret -n prod \
#     --from-literal=user=lagrangefi --from-literal=password=<password>
#   kubectl create secret generic chain-secret -n prod \
#     --from-literal=WALLET_PRIVATE_KEY=<key>
#   kubectl create secret generic api-secret -n prod \
#     --from-literal=DATABASE_PASSWORD=<password> \
#     --from-literal=TELEGRAM_BOT_TOKEN=<token>
