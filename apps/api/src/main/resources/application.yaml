host: "0.0.0.0"
port: 3000
chainServiceUrl: ${CHAIN_SERVICE_URL}

database:
  url: ${DATABASE_URL}
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}
  poolSize: 10

telegram:
  botToken: ${TELEGRAM_BOT_TOKEN}
  chatId: ${TELEGRAM_CHAT_ID}

jwt:
  secret: ${JWT_SECRET}

wallet:
  # Base64-encoded 32-byte key. Generate with: openssl rand -base64 32
  encryptionKey: ${WALLET_ENCRYPTION_KEY}
