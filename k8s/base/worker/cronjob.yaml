apiVersion: batch/v1
kind: CronJob
metadata:
  name: api
spec:
  # Runs every minute — the api service itself controls actual poll frequency
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: api
              image: lagrangefi/api:latest
              envFrom:
                - configMapRef:
                    name: api-config
                - secretRef:
                    name: api-secret
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
